services:
  selenoid:
    image: "aerokube/selenoid:latest"
    platform: linux/amd64
    container_name: selenoid
    ports:
      - "4444:4444"
    networks:
      - selenoid
    volumes:
      - ".:/etc/selenoid"
      - "./target:/output"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./target:/opt/selenoid/video"
    environment:
      - DOCKER_API_VERSION=1.40
      - OVERRIDE_VIDEO_OUTPUT_DIR=${PWD}/target
    command: ["-conf", "/etc/selenoid/browsers.json", "-video-output-dir", "/opt/selenoid/video", "-container-network", "selenoid", "-limit", "15"]
  selenoid-ui:
    image: "aerokube/selenoid-ui:latest"
    platform: linux/amd64
    container_name: selenoid-ui
    links:
      - selenoid
    ports:
      - "8080:8080"
    networks:
      - selenoid
    command: ["--selenoid-uri", "http://selenoid:4444"]
  chrome_124.0:
    image: "selenoid/vnc:chrome_124.0"
    platform: linux/amd64
    container_name: chrome_124.0
    links:
      - selenoid
      - selenoid-ui
    depends_on:
      - selenoid
      - selenoid-ui
    networks:
      - selenoid
    volumes:
      - "/dev/shm:/dev/shm"

  chrome_125.0:
